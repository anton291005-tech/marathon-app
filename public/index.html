<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f40812" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MyRace" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="description"
      content="Kompakte Marathon-App fuer Trainingsplan, Logs, Recovery und Wochenfokus."
    />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>MyRace</title>
    <style>
      html, body, #root {
        margin: 0;
        min-height: 100%;
      }
      body {
        background: #f40812;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        background: #f40812;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity .28s ease;
      }
      #boot-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash-logo {
        width: min(28vw, 132px);
        height: min(28vw, 132px);
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="boot-splash" aria-hidden="true">
      <svg id="boot-splash-logo" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M106 34V78" stroke="white" stroke-width="14" stroke-linecap="round"/>
        <path d="M112 45L136 59L112 72V45Z" fill="white"/>
        <path d="M96 58H56C41 58 31 68 31 82C31 96 41 106 56 106H93C108 106 118 116 118 130C118 144 108 154 93 154H34" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M41 124V143L79 131L41 124Z" fill="white"/>
      </svg>
    </div>
    <div id="root"></div>
  </body>
</html>
