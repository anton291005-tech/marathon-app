<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b0b15" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MyRace" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="description"
      content="Kompakte Marathon-App fuer Trainingsplan, Logs, Recovery und Wochenfokus."
    />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>MyRace</title>
    <style>
      html, body, #root {
        margin: 0;
        min-height: 100%;
      }
      body {
        background: #0b0b15;
      }
      #boot-splash {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at top, rgba(244, 8, 18, 0.18) 0%, rgba(11, 11, 21, 0.96) 38%, #070912 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity .24s ease;
      }
      #boot-splash.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #boot-splash-logo {
        width: min(24vw, 108px);
        height: min(24vw, 108px);
        border-radius: 24px;
        box-shadow: 0 18px 40px rgba(2, 6, 23, 0.28);
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="boot-splash" aria-hidden="true">
      <img id="boot-splash-logo" src="%PUBLIC_URL%/logo192.png" alt="MyRace" />
    </div>
    <script>
      window.setTimeout(function () {
        var splash = document.getElementById("boot-splash");
        if (!splash) return;
        splash.classList.add("hidden");
      }, 480);
    </script>
    <div id="root"></div>
  </body>
</html>
